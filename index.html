<!DOCTYPE html>
<html lang="ms" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Utama URC</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Optional Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Animations for notifications */
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
  </style>
</head>

<body class="bg-gray-900 text-white min-h-full">

  <!-- ===== Dashboard Header ===== -->
  <header class="p-4 bg-gray-800 shadow-md rounded-b-lg">
    <h1 id="main-title" class="text-3xl font-bold">Dashboard Utama URC</h1>
    <p id="subtitle" class="text-gray-300 mt-1">Rekod dan pemantauan guru</p>
    <p id="school-name" class="text-gray-400 mt-1">Sekolah Kebangsaan Umas-Umas</p>
    <p id="motto" class="text-yellow-400 font-semibold mt-1">Cemerlang dan Berjaya</p>
  </header>

  <!-- ===== Main Dashboard Content ===== -->
  <main id="main-dashboard" class="p-6 space-y-6">
    
    <!-- Laporan Kawalan Kelas -->
    <section id="laporan-kelas-section" class="space-y-4">
      <h2 class="text-xl font-bold text-yellow-400">📚 Rekod Kawalan Kelas</h2>
      <div id="laporan-kelas-container" class="space-y-4">
        <!-- Rekod kelas akan dijana di sini melalui JS -->
      </div>
    </section>

    <!-- Laporan PDP -->
    <section id="laporan-pdp-section" class="space-y-4 mt-8">
      <h2 class="text-xl font-bold text-yellow-400">👨‍🏫 Pemantauan PDP</h2>
      <div id="laporan-pdp-container" class="space-y-4">
        <!-- Rekod PDP akan dijana di sini melalui JS -->
      </div>
    </section>
    
  </main>

      <!-- ===== Forms and Interactive Containers ===== -->
    
    <!-- Form Rekod Kehadiran Murid / Kawalan Kelas -->
    <section id="form-kelas-section" class="bg-gray-800 p-4 rounded-lg shadow-md">
      <h3 class="text-lg font-semibold text-yellow-400 mb-2">Tambah Rekod Kehadiran Murid</h3>
      <form id="murid-form" class="space-y-2" onsubmit="submitKehadiranMurid(event)">
        <div class="flex flex-col md:flex-row gap-2">
          <input type="text" id="murid-nama" placeholder="Nama Murid" class="p-2 rounded bg-gray-700 text-white flex-1" required>
          <input type="text" id="murid-kelas" placeholder="Kelas" class="p-2 rounded bg-gray-700 text-white flex-1" required>
        </div>
        <div class="flex flex-col md:flex-row gap-2">
          <input type="date" id="murid-tarikh" class="p-2 rounded bg-gray-700 text-white flex-1" required>
          <select id="murid-status" class="p-2 rounded bg-gray-700 text-white flex-1" required>
            <option value="">Pilih Status</option>
            <option value="Hadir">Hadir</option>
            <option value="Tidak Hadir">Tidak Hadir</option>
            <option value="Cuti Sakit">Cuti Sakit</option>
          </select>
        </div>
        <button type="submit" class="bg-yellow-400 text-gray-900 font-semibold px-4 py-2 rounded hover:bg-yellow-500 transition">
          Tambah Rekod
        </button>
      </form>
      <!-- Container to display the kelas records dynamically -->
      <div id="murid-list" class="mt-4 space-y-2">
        <!-- JS will populate entries here -->
      </div>
    </section>

    <!-- Form Pemantauan PDP -->
    <section id="form-pdp-section" class="bg-gray-800 p-4 rounded-lg shadow-md mt-6">
      <h3 class="text-lg font-semibold text-yellow-400 mb-2">Tambah Rekod Pemantauan PDP</h3>
      <form id="pdp-form" class="space-y-2" onsubmit="submitPdpRecord(event)">
        <div class="flex flex-col md:flex-row gap-2">
          <input type="text" id="guru-nama" placeholder="Nama Guru" class="p-2 rounded bg-gray-700 text-white flex-1" required>
          <input type="text" id="kelas-pdp" placeholder="Kelas / Tahun" class="p-2 rounded bg-gray-700 text-white flex-1" required>
        </div>
        <div class="flex flex-col md:flex-row gap-2">
          <input type="date" id="tarikh-pdp" class="p-2 rounded bg-gray-700 text-white flex-1" required>
          <textarea id="aktiviti-pdp" placeholder="Aktiviti / Catatan" class="p-2 rounded bg-gray-700 text-white flex-1" required></textarea>
        </div>
        <button type="submit" class="bg-yellow-400 text-gray-900 font-semibold px-4 py-2 rounded hover:bg-yellow-500 transition">
          Tambah PDP
        </button>
      </form>
      <div id="pdp-list" class="mt-4 space-y-2">
        <!-- JS will populate PDP entries here -->
      </div>
    </section>

    <!-- Form Rekod GBPK / Guru Besar PK -->
    <section id="form-gbpk-section" class="bg-gray-800 p-4 rounded-lg shadow-md mt-6">
      <h3 class="text-lg font-semibold text-yellow-400 mb-2">Tambah Rekod GBPK</h3>
      <form id="gbpk-form" class="space-y-2" onsubmit="submitGbpkRecord(event)">
        <div class="flex flex-col md:flex-row gap-2">
          <input type="text" id="nama-gbpk" placeholder="Nama GBPK" class="p-2 rounded bg-gray-700 text-white flex-1" required>
          <input type="text" id="jabatan-gbpk" placeholder="Jabatan / Unit" class="p-2 rounded bg-gray-700 text-white flex-1" required>
        </div>
        <div class="flex flex-col md:flex-row gap-2">
          <input type="date" id="tarikh-gbpk" class="p-2 rounded bg-gray-700 text-white flex-1" required>
          <textarea id="catatan-gbpk" placeholder="Catatan / Ulasan" class="p-2 rounded bg-gray-700 text-white flex-1" required></textarea>
        </div>
        <button type="submit" class="bg-yellow-400 text-gray-900 font-semibold px-4 py-2 rounded hover:bg-yellow-500 transition">
          Tambah Rekod GBPK
        </button>
      </form>
      <div id="gbpk-list" class="mt-4 space-y-2">
        <!-- JS will populate GBPK entries here -->
      </div>
    </section>

      <!-- ===== Modals for Details / Edit ===== -->
    
    <!-- Modal Example for Murid -->
    <div id="muridModal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50">
      <div class="bg-gray-800 rounded-lg p-6 w-11/12 md:w-1/2">
        <h3 class="text-xl font-semibold text-yellow-400 mb-4">Maklumat Murid</h3>
        <div id="murid-modal-content" class="space-y-2">
          <!-- JS will populate modal details here -->
        </div>
        <button onclick="closeModal('muridModal')" class="mt-4 bg-yellow-400 text-gray-900 px-4 py-2 rounded hover:bg-yellow-500 transition">Tutup</button>
      </div>
    </div>

    <!-- Modal Example for PDP -->
    <div id="pdpModal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50">
      <div class="bg-gray-800 rounded-lg p-6 w-11/12 md:w-1/2">
        <h3 class="text-xl font-semibold text-yellow-400 mb-4">Maklumat PDP</h3>
        <div id="pdp-modal-content" class="space-y-2">
          <!-- JS will populate modal details here -->
        </div>
        <button onclick="closeModal('pdpModal')" class="mt-4 bg-yellow-400 text-gray-900 px-4 py-2 rounded hover:bg-yellow-500 transition">Tutup</button>
      </div>
    </div>

    <!-- Export / PDF Buttons -->
    <div class="mt-6 flex flex-col md:flex-row gap-4">
      <button onclick="exportMuridPDF()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded font-semibold">Muat Turun Rekod Murid (PDF)</button>
      <button onclick="exportPdpPDF()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded font-semibold">Muat Turun Rekod PDP (PDF)</button>
      <button onclick="exportGbpkPDF()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded font-semibold">Muat Turun Rekod GBPK (PDF)</button>
    </div>

    <!-- Notification / Toast Container -->
    <div id="notification-container" class="fixed bottom-4 right-4 space-y-2 z-50">
      <!-- JS will append notifications here -->
    </div>

    <!-- Footer -->
    <footer class="text-center text-yellow-400 text-sm mt-12">
      <p>© 2026 Sistem Pengurusan Kokurikulum</p>
    </footer>

    <!-- ===== Firebase & Main JS ===== -->
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/main.js"></script>

      <!-- End of main dashboard container -->
</div> <!-- #main-dashboard -->

<!-- Optional: include any additional scripts here -->
<script type="module" src="./js/firebase-config.js"></script>
<script type="module" src="./js/main.js"></script>

</body>
</html>
